<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техника — RentTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="content-wrapper">
        <!-- ШАПКА -->
        <header class="header-top">
            <div class="container-custom d-flex flex-wrap align-items-center justify-content-between">
                <a href="catalog.html" class="logo"><i class="fas fa-tractor"></i> RentTech</a>
                <div class="contact-info d-none d-md-block">
                    <i class="fas fa-phone-alt"></i> +7 (800) 123-45-67
                    <span class="mx-2">|</span>
                    <i class="fas fa-clock"></i> Ежедневно 8:00–20:00
                </div>
                <div class="auth-buttons">
                    <span id="userStatus" class="me-2">Гость</span>
                    <button id="loginBtn" class="btn btn-outline-primary btn-sm" onclick="openAuthModal('login')">Вход</button>
                    <button id="registerBtn" class="btn btn-secondary btn-sm" onclick="openAuthModal('register')">Регистрация</button>
                    <button id="logoutBtn" class="btn btn-outline-danger btn-sm d-none" onclick="logout()">Выйти</button>
                </div>
            </div>
        </header>

        <!-- НАВИГАЦИЯ -->
        <div class="container-custom">
            <ul class="nav nav-tabs">
                <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Личный кабинет</a></li>
                <li class="nav-item"><a class="nav-link" href="analytics.html">Аналитика</a></li>
                <li class="nav-item"><a class="nav-link" href="myEquipment.html">Моя техника</a></li>
                <li class="nav-item admin-tab"><a class="nav-link" href="clients.html">Клиенты</a></li>
                <li class="nav-item admin-tab"><a class="nav-link active" href="equipment.html">Техника</a></li>
                <li class="nav-item admin-tab"><a class="nav-link" href="rentals.html">Бронирования</a></li>
                <li class="nav-item admin-tab"><a class="nav-link" href="maintenances.html">ТО</a></li>
            </ul>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="container-custom mt-3">
            <div class="d-flex justify-content-between mb-3">
                <h3>Список техники (администрирование)</h3>
                <button class="btn btn-primary" onclick="showEquipmentForm()"><i class="fas fa-plus"></i> Добавить технику</button>
            </div>
            <!-- Фильтры -->
            <div class="row mb-3">
                <div class="col-md-3">
                    <input type="text" id="eqSearch" class="form-control" placeholder="Название">
                </div>
                <div class="col-md-3">
                    <select id="eqTypeFilter" class="form-select">
                        <option value="">Все типы</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="eqStatusFilter" class="form-select">
                        <option value="">Все статусы</option>
                        <option value="доступен">Доступен</option>
                        <option value="в аренде">В аренде</option>
                        <option value="на обслуживании">На обслуживании</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="applyEquipmentFilters()"><i class="fas fa-filter"></i> Применить</button>
                    <button class="btn btn-secondary w-100 mt-1" onclick="resetEquipmentFilters()">Сбросить</button>
                </div>
            </div>
            <div id="equipmentList"></div>
        </div>
    </div>

    <!-- МОДАЛКА ДЛЯ ТЕХНИКИ (админ) -->
    <div class="modal fade" id="equipmentModalAdmin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="equipmentModalAdminLabel">Добавление техники</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="equipmentForm">
                        <input type="hidden" id="equipmentId" value="0">
                        <div class="mb-2"><label>Название</label><input type="text" id="equipmentName" class="form-control" required></div>
                        <!-- ТИП – ТЕПЕРЬ ВЫПАДАЮЩИЙ СПИСОК -->
                        <div class="mb-2">
                            <label>Тип</label>
                            <select id="equipmentTypeId" class="form-select" required>
                                <option value="">Выберите тип</option>
                            </select>
                        </div>
                        <div class="mb-2"><label>Год выпуска</label><input type="number" id="equipmentYear" class="form-control" required></div>
                        <div class="mb-2"><label>Стоимость аренды (час)</label><input type="number" step="0.01" id="equipmentRate" class="form-control" required></div>
                        <div class="mb-2">
                            <label>Статус</label>
                            <select id="equipmentStatus" class="form-select">
                                <option value="доступен">Доступен</option>
                                <option value="в аренде">В аренде</option>
                                <option value="на обслуживании">На обслуживании</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label>Дата последнего ТО</label>
                            <input type="date" id="equipmentLastMaintenanceDate" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ ДЛЯ АВТОРИЗАЦИИ И ДЕТАЛЕЙ -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">...</div>
    <div class="modal fade" id="equipmentModal" tabindex="-1" aria-hidden="true">...</div>

    <!-- ФУТЕР -->
    <footer class="footer">...</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
