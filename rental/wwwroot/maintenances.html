<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТО — RentTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="content-wrapper">
        <!-- ШАПКА -->
        <header class="header-top">
            <div class="container-custom d-flex flex-wrap align-items-center justify-content-between">
                <a href="catalog.html" class="logo"><i class="fas fa-tractor"></i> RentTech</a>
                <div class="contact-info d-none d-md-block">
                    <i class="fas fa-phone-alt"></i> +7 (800) 123-45-67
                    <span class="mx-2">|</span>
                    <i class="fas fa-clock"></i> Ежедневно 8:00–20:00
                </div>
                <div class="auth-buttons">
                    <span id="userStatus" class="me-2">Гость</span>
                    <button id="loginBtn" class="btn btn-outline-primary btn-sm" onclick="openAuthModal('login')">Вход</button>
                    <button id="registerBtn" class="btn btn-secondary btn-sm" onclick="openAuthModal('register')">Регистрация</button>
                    <button id="logoutBtn" class="btn btn-outline-danger btn-sm d-none" onclick="logout()">Выйти</button>
                </div>
            </div>
        </header>

        <!-- НАВИГАЦИЯ -->
        <div class="container-custom">
            <ul class="nav nav-tabs">
                <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Личный кабинет</a></li>
                <li class="nav-item"><a class="nav-link" href="analytics.html">Аналитика</a></li>
                <li class="nav-item"><a class="nav-link" href="myEquipment.html">Моя техника</a></li>
                <li class="nav-item admin-tab"><a class="nav-link" href="clients.html">Клиенты</a></li>
                <li class="nav-item admin-tab"><a class="nav-link" href="equipment.html">Техника</a></li>
                <li class="nav-item admin-tab"><a class="nav-link" href="rentals.html">Бронирования</a></li>
                <li class="nav-item admin-tab"><a class="nav-link active" href="maintenances.html">ТО</a></li>
            </ul>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="container-custom mt-3">
            <div class="d-flex justify-content-between mb-3">
                <h3>Управление ТО</h3>
                <button class="btn btn-primary" onclick="showMaintenanceForm()"><i class="fas fa-plus"></i> Добавить ТО</button>
            </div>

            <!-- Фильтры -->
            <div class="row mb-3">
                <div class="col-md-3">
                    <select id="maintenanceEquipmentFilter" class="form-select">
                        <option value="">Все техника</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="maintenanceTypeFilter" class="form-select">
                        <option value="">Все типы</option>
                        <option value="плановое">Плановое</option>
                        <option value="аварийное">Аварийное</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" id="maintenanceDateFrom" class="form-control" placeholder="С даты">
                </div>
                <div class="col-md-2">
                    <input type="date" id="maintenanceDateTo" class="form-control" placeholder="По дату">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="applyMaintenanceFilters()"><i class="fas fa-filter"></i> Применить</button>
                    <button class="btn btn-secondary w-100 mt-1" onclick="resetMaintenanceFilters()">Сбросить</button>
                </div>
            </div>

            <div id="maintenancesList"></div>
        </div>
    </div>

    <!-- МОДАЛКА ДЛЯ ТО -->
    <div class="modal fade" id="maintenanceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="maintenanceModalLabel">Добавление ТО</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="maintenanceForm">
                        <input type="hidden" id="maintenanceId" value="0">
                        <div class="mb-2">
                            <label>Техника</label>
                            <select id="maintenanceEquipmentId" class="form-select" required>
                                <option value="">Выберите технику</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label>Дата начала</label>
                            <input type="datetime-local" id="maintenanceStart" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label>Дата окончания</label>
                            <input type="datetime-local" id="maintenanceEnd" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label>Тип</label>
                            <select id="maintenanceType" class="form-select">
                                <option value="плановое">Плановое</option>
                                <option value="аварийное">Аварийное</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label>Стоимость</label>
                            <input type="number" step="0.01" id="maintenanceCost" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ ДЛЯ АВТОРИЗАЦИИ И ДЕТАЛЕЙ -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">...</div>
    <div class="modal fade" id="equipmentModal" tabindex="-1" aria-hidden="true">...</div>

    <!-- ФУТЕР -->
    <footer class="footer">...</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
